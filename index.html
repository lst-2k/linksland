<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --ps-blue: #00439C; --xbox-green: #107C10; --steam-blue: #171D25; --golf-green: #2e7d32; --under-red: #d32f2f; --bg-tint: #eceff1; --sig-purple: #673ab7; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-tint); padding: 0; color: #333; margin: 0; }
        .league-banner { background: white; text-align: center; border-bottom: 4px solid var(--golf-green); width: 100%; }
        .league-logo { width: 100%; height: auto; display: block; }
        .main-content { width: 100%; max-width: 1000px; margin: auto; padding-bottom: 50px; }
        .section-header { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .scroller { width: 100%; overflow-x: auto; background: white; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #2c3e50; color: white; padding: 12px 8px; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap; }
        .player-col { text-align: left !important; padding-left: 10px; font-weight: 500; }
        .fa-brands { font-size: 1.1em; vertical-align: middle; margin-right: 6px; width: 18px; text-align: center; }
        .fa-playstation { color: var(--ps-blue); } .fa-xbox { color: var(--xbox-green); } .fa-steam { color: var(--steam-blue); }
        .to-par-cell { font-weight: 900; font-size: 1.1em; background: #fcfcfc; width: 60px; }
        .under-par { color: var(--under-red); }
        .sig-tag { background: var(--sig-purple); color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        h3 { color: var(--golf-green); font-size: 1.2em; padding: 12px 15px; margin: 0; background: #f9f9f9; border-bottom: 1px solid #eee; }
        .history-header { background: #fff; padding: 15px; border: 1px solid #ddd; margin-top: 5px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--golf-green); }
        .history-header:hover { background: #f1f1f1; }
        .history-header::after { content: '\f0d7'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }
        .history-content { display: none; background: white; border: 1px solid #ddd; border-top: none; padding: 15px; }
    </style>
</head>
<body>

<header class="league-banner"><img src="logo.png" alt="Logo" class="league-logo" onerror="this.style.display='none'"></header>

<div class="main-content">
    <div class="section-header">
        <h2 id="venueName" style="margin:0; font-size: 1.4em;">⛳ Loading...</h2>
        <div id="sigStatus"></div>
    </div>

    <h3>Current Tournament Leaderboard</h3>
    <div class="scroller">
        <table>
            <thead>
                <tr><th>Pos</th><th class="player-col">Player</th><th>To Par</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>Total</th><th style="background:#0277bd;">Bonus</th><th>Pts</th></tr>
            </thead>
            <tbody id="liveBody"></tbody>
        </table>
    </div>

    <h3>Season Standings</h3>
    <div class="scroller">
        <table>
            <thead>
                <tr><th>Rank</th><th class="player-col">Player</th><th>Played</th><th>Total Points</th></tr>
            </thead>
            <tbody id="seasonBody"></tbody>
        </table>
    </div>

    <div id="historyContainer"></div>
</div>

<script>
    async function loadLeaderboard() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            document.getElementById('venueName').innerText = `⛳ ${data.venue || 'Tournament'} (${data.date || ''})`;
            if(data.isSig) document.getElementById('sigStatus').innerHTML = '<span class="sig-tag">🏆 SIGNATURE EVENT</span>';
            renderLeaderboard(data);
            renderStandings(data.season); 
            renderHistory(data.history);
        } catch (e) { console.error(e); }
    }

    function getPlatformIcon(p) {
        const c = (p || "").toLowerCase();
        if (c.includes('ps')) return '<i class="fa-brands fa-playstation"></i>';
        if (c.includes('xb')) return '<i class="fa-brands fa-xbox"></i>';
        return '<i class="fa-brands fa-steam"></i>';
    }

    function calculatePts(rank, isSig, hasBirds, hasLow) {
        let base = rank === 1 ? 200 : rank === 2 ? 175 : rank === 3 ? 150 : rank === 4 ? 100 : Math.max(0, 100 - ((rank - 4) * 10));
        if (isSig) base *= 2;
        const bVal = isSig ? 20 : 10;
        let bonus = (hasBirds ? bVal : 0) + (hasLow ? bVal : 0);
        return { total: base + bonus, bonusOnly: bonus };
    }

    function renderLeaderboard(data) {
        const lBody = document.getElementById('liveBody');
        lBody.innerHTML = '';
        const par = parseInt(data.par) || 72;
        let players = data.players.map(p => {
            const s = [p.r1, p.r2, p.r3, p.r4].map(v => parseInt(v)||0).filter(v => v > 0);
            const total = s.reduce((a,b) => a+b, 0);
            return { ...p, total, toPar: s.length > 0 ? total - (s.length * par) : 999, active: s.length };
        }).sort((a,b) => a.toPar - b.toPar);

        players.forEach((p, i) => {
            if (p.active === 0) return;
            let firstIdx = i;
            while (firstIdx > 0 && players[firstIdx - 1].toPar === p.toPar) firstIdx--;
            const isTied = (i > 0 && players[i-1].toPar === p.toPar) || (i < players.length-1 && players[i+1].toPar === p.toPar);
            const rankLabel = isTied ? `T${firstIdx + 1}` : i + 1;
            const ptsData = calculatePts(firstIdx + 1, data.isSig, (parseInt(p.birdies) > 0), p.isLow);
            const toParDisp = p.toPar === 0 ? "E" : (p.toPar > 0 ? `+${p.toPar}` : p.toPar);
            lBody.innerHTML += `<tr><td>${rankLabel}</td><td class="player-col">${getPlatformIcon(p.console)} ${p.name}</td><td class="to-par-cell ${p.toPar < 0 ? 'under-par' : ''}">${toParDisp}</td><td>${p.r1||'-'}</td><td>${p.r2||'-'}</td><td>${p.r3||'-'}</td><td>${p.r4||'-'}</td><td>${p.total}</td><td style="color:#0277bd; font-weight:bold;">+${ptsData.bonusOnly}</td><td style="color:var(--golf-green); font-weight:bold;">${ptsData.total}</td></tr>`;
        });
    }

    function renderStandings(seasonData) {
        const sBody = document.getElementById('seasonBody');
        if (!sBody || !seasonData) return;
        const sorted = Object.entries(seasonData).map(([name, info]) => ({ name, ...info })).sort((a, b) => b.points - a.points);
        sBody.innerHTML = '';
        sorted.forEach((p, i) => {
            let firstIdx = i;
            while (firstIdx > 0 && sorted[firstIdx - 1].points === p.points) firstIdx--;
            const isTied = (i > 0 && sorted[i-1].points === p.points) || (i < sorted.length-1 && sorted[i+1].points === p.points);
            const rankLabel = isTied ? `T${firstIdx + 1}` : i + 1;
            sBody.innerHTML += `<tr><td>${rankLabel}</td><td class="player-col">${getPlatformIcon(p.console)} ${p.name}</td><td>${p.eventsPlayed || 0}</td><td style="color:var(--golf-green); font-weight:bold;">${p.points}</td></tr>`;
        });
    }

    function renderHistory(historyHTML) {
        const hDiv = document.getElementById('historyContainer');
        if (hDiv && historyHTML) { hDiv.innerHTML = `<h3>Weekly History</h3>` + historyHTML.replace(/>\+999</g, '>--<'); }
    }

    function toggleHistory(header) {
        const content = header.nextElementSibling;
        const isVisible = content.style.display === "block";
        document.querySelectorAll('.history-content').forEach(c => c.style.display = "none");
        content.style.display = isVisible ? "none" : "block";
    }
    window.onload = loadLeaderboard;
</script>
</body>
</html>
