<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --ps-blue: #00439C; --xbox-green: #107C10; --steam-blue: #171D25; --golf-green: #2e7d32; --under-red: #d32f2f; --bg-tint: #eceff1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-tint); padding: 0; color: #333; margin: 0; }
        .league-banner { background: white; text-align: center; border-bottom: 4px solid var(--golf-green); width: 100%; }
        .league-logo { width: 100%; height: auto; display: block; }
        .main-content { width: 100%; margin: 0; padding: 0; }
        .section-header { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }
        .scroller { width: 100%; overflow-x: auto; background: white; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #2c3e50; color: white; padding: 12px 8px; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap; }
        .w-shrink { width: 1%; }
        .player-col { text-align: left !important; padding-left: 10px; }
        .fa-brands { font-size: 1.1em; vertical-align: middle; margin-right: 6px; width: 18px; text-align: center; }
        .fa-playstation { color: var(--ps-blue); } .fa-xbox { color: var(--xbox-green); } .fa-steam { color: var(--steam-blue); }
        .to-par-cell { font-weight: 900; font-size: 1.1em; background: #fcfcfc; width: 60px; }
        .under-par { color: var(--under-red); }
        .sig-tag { background: var(--sig-purple); color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        h3 { color: var(--golf-green); font-size: 1.2em; padding: 12px 15px; margin: 0; background: #f9f9f9; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header class="league-banner"><img src="logo.png" alt="Logo" class="league-logo" onerror="this.style.display='none'"></header>

<div class="main-content">
    <div class="section-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="venueName" style="margin:0; font-size: 1.4em;">⛳ Loading...</h2>
        <div id="sigStatus"></div>
    </div>

    <h3>Current Tournament Leaderboard</h3>
    <div class="scroller">
        <table>
            <thead>
                <tr>
                    <th class="w-shrink">Pos</th>
                    <th class="player-col">Player</th>
                    <th class="w-shrink">To Par</th>
                    <th class="w-shrink">R1</th><th class="w-shrink">R2</th><th class="w-shrink">R3</th><th class="w-shrink">R4</th>
                    <th class="w-shrink">Total</th>
                    <th class="w-shrink" style="background:#0277bd;">Bonus</th>
                    <th class="w-shrink">Pts</th>
                </tr>
            </thead>
            <tbody id="liveBody"></tbody>
        </table>
    </div>

		<h2>Season Standings</h2>
		<table>
			<thead>
				<tr>
					<th>Rank</th>
					<th>Player</th>
					<th>Total Points</th>
				</tr>
			</thead>
			<tbody id="seasonBody">
				</tbody>
		</table>
    </div>
    <div id="historyContainer"></div>
</div>

<script>
    // 1. DATA LOADING
    async function loadLeaderboard() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error("Could not find data.json");
            const data = await response.json();
            
            // Set Header Info
            document.getElementById('venueName').innerText = `⛳ ${data.venue || 'Tournament'} (${data.date || ''})`;
            if(data.isSig) {
                document.getElementById('sigStatus').innerHTML = '<span class="sig-tag">🏆 SIGNATURE EVENT</span>';
            }

            // Render all sections
            renderLeaderboard(data);
            renderStandings(data.season); 
            renderHistory(data.history);
        } catch (e) {
            console.error("Error loading data.json:", e);
            document.getElementById('venueName').innerText = "❌ Error Loading Data";
        }
    }

    function getPlatformIcon(p) {
        const c = (p || "").toLowerCase();
        if (c.includes('ps')) return '<i class="fa-brands fa-playstation"></i>';
        if (c.includes('xb')) return '<i class="fa-brands fa-xbox"></i>';
        return '<i class="fa-brands fa-steam"></i>';
    }

    function calculatePts(rank, isSig, hasBirds, hasLow) {
        let base = rank === 1 ? 250 : rank === 2 ? 200 : rank === 3 ? 150 : rank === 4 ? 100 : Math.max(0, 100 - ((rank - 4) * 10));
        if (isSig) base *= 2;
        const bVal = isSig ? 20 : 10;
        let bonus = 0;
        if (hasBirds) bonus += bVal;
        if (hasLow) bonus += bVal;
        return { total: base + bonus, bonusOnly: bonus };
    }

    // 2. LIVE TOURNAMENT RENDER
    function renderLeaderboard(data) {
        const lBody = document.getElementById('liveBody');
        if(!lBody) return;
        lBody.innerHTML = '';
        const par = parseInt(data.par) || 72;
        
        // Sort players by score
        let players = data.players.map(p => {
            const s = [parseInt(p.r1)||0, parseInt(p.r2)||0, parseInt(p.r3)||0, parseInt(p.r4)||0].filter(v => v > 0);
            const total = s.reduce((a,b) => a+b, 0);
            return { ...p, total, toPar: s.length > 0 ? total - (s.length * par) : 999, active: s.length };
        }).sort((a,b) => a.toPar - b.toPar);

        players.forEach((p, i) => {
            if (p.active === 0) return;

            // Tie Logic
            let displayRank = i + 1;
            let isTied = false;
            const scoreAbove = i > 0 ? players[i-1].toPar : null;
            const scoreBelow = i < players.length - 1 ? players[i+1].toPar : null;

            if (p.toPar === scoreAbove || p.toPar === scoreBelow) {
                isTied = true;
                let firstOccurence = i;
                while (firstOccurence > 0 && players[firstOccurence - 1].toPar === p.toPar) firstOccurence--;
                displayRank = firstOccurence + 1;
            }

            const rankLabel = isTied ? `T${displayRank}` : displayRank;
            const toParDisp = p.toPar === 0 ? "E" : (p.toPar > 0 ? `+${p.toPar}` : p.toPar);

            // Calculate Points & Bonuses
            const ptsData = calculatePts(displayRank, data.isSig, (parseInt(p.birdies) > 0), p.isLow);
            let bDisp = "-";
            if (ptsData.bonusOnly > 0) {
                bDisp = `+${ptsData.bonusOnly} ${(parseInt(p.birdies)>0)?'🐦':''} ${(p.isLow)?'📉':''}`;
            }

            lBody.innerHTML += `
                <tr>
                    <td class="w-shrink" style="font-weight:bold;">${rankLabel}</td>
                    <td class="player-col">${getPlatformIcon(p.console)} ${p.name}</td>
                    <td class="to-par-cell ${p.toPar < 0 ? 'under-par' : ''}">${toParDisp}</td>
                    <td>${p.r1||'-'}</td><td>${p.r2||'-'}</td><td>${p.r3||'-'}</td><td>${p.r4||'-'}</td>
                    <td>${p.total}</td>
                    <td style="color:#0277bd; font-weight:bold;">${bDisp}</td>
                    <td style="color:var(--golf-green); font-weight:bold;">${ptsData.total}</td>
                </tr>`;
        });
    }

    // 3. SEASON STANDINGS RENDER
    function renderStandings(seasonData) {
        const sBody = document.getElementById('seasonBody');
        if (!sBody || !seasonData) return;
        sBody.innerHTML = '';

        const sortedStandings = Object.entries(seasonData)
            .map(([name, info]) => ({ name, ...info }))
            .sort((a, b) => b.points - a.points);

        sortedStandings.forEach((player, index) => {
            sBody.innerHTML += `
                <tr>
                    <td style="font-weight:bold;">${index + 1}</td>
                    <td class="player-col">${getPlatformIcon(player.console)} ${player.name}</td>
                    <td style="color:var(--golf-green); font-weight:bold;">${player.points}</td>
                </tr>`;
        });
    }

    // 4. HISTORY RENDER
    function renderHistory(historyHTML) {
        const hDiv = document.getElementById('historyContainer');
        if (hDiv && historyHTML) {
            hDiv.innerHTML = '<h3>Tournament History</h3>' + historyHTML;
        }
    }

    // This must match the function name above!
    window.onload = loadLeaderboard; 

    // Helper for History Accordion
    function toggleHistory(header) {
        const content = header.nextElementSibling;
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    }
</script>
</body>
</html>
