<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --ps-blue: #00439C; --xbox-green: #107C10; --steam-blue: #171D25;
            --golf-green: #2e7d32; --sig-purple: #673ab7; --under-red: #d32f2f;
            --bg-tint: #eceff1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-tint); 
            padding: 0; color: #333; margin: 0; 
        }
        
        .league-banner { background: white; text-align: center; border-bottom: 4px solid var(--golf-green); width: 100%; }
        .league-logo { width: 100%; height: auto; display: block; }
        
        .main-content { width: 100%; margin: 0; padding: 0; }

        .section-header { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; }

        .scroller { 
            width: 100%; 
            overflow-x: auto; 
            background: white; 
            -webkit-overflow-scrolling: touch;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }
        
        /* Table Optimization */
        table { width: 100%; border-collapse: collapse; background: white; table-layout: auto; }
        th { background: #2c3e50; color: white; padding: 12px 8px; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; white-space: nowrap; }

        /* Narrow Columns (Width fits content) */
        .w-shrink { width: 1%; white-space: nowrap; }

        /* Player Alignment */
        .player-col { text-align: left !important; padding-left: 10px; width: auto; }

        tr:hover td { background-color: #f8f9fa; }

        /* Icon Styling */
        .fa-brands { font-size: 1.1em; vertical-align: middle; margin-right: 6px; width: 18px; text-align: center; }
        .fa-playstation { color: var(--ps-blue); }
        .fa-xbox { color: var(--xbox-green); }
        .fa-steam { color: var(--steam-blue); }

        .to-par-cell { font-weight: 900; font-size: 1.1em; background: #fcfcfc; width: 60px; }
        .under-par { color: var(--under-red); } 
        
        .sig-tag { background: var(--sig-purple); color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        
        h3 { 
            color: var(--golf-green); font-size: 1.2em; 
            padding: 12px 15px; margin: 0; background: #f9f9f9;
            border-bottom: 1px solid #eee;
        }

        /* History Accordion */
        .history-header { background: #455a64; color: white; padding: 15px; cursor: pointer; font-weight: 600; border-bottom: 1px solid #333; }
        .history-content { display: none; width: 100%; }
    </style>
</head>
<body>

<header class="league-banner">
    <img src="logo.png" alt="League Logo" class="league-logo" onerror="this.style.display='none'">
</header>

<div class="main-content">
    <div class="section-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="venueName" style="margin:0; font-size: 1.4em;">⛳ Loading...</h2>
        <div id="sigStatus"></div>
    </div>

    <h3>Current Tournament Leaderboard</h3>
    <div class="scroller">
        <table>
            <thead>
                <tr>
                    <th class="w-shrink">Pos</th>
                    <th class="player-col">Player</th>
                    <th class="w-shrink">To Par</th>
                    <th class="w-shrink">R1</th>
                    <th class="w-shrink">R2</th>
                    <th class="w-shrink">R3</th>
                    <th class="w-shrink">R4</th>
                    <th class="w-shrink">Total</th>
                    <th class="w-shrink">Pts</th>
                </tr>
            </thead>
            <tbody id="liveBody"></tbody>
        </table>
    </div>

    <h3>Season Standings</h3>
    <div class="scroller">
        <table>
            <thead>
                <tr>
                    <th class="w-shrink">Rank</th>
                    <th class="w-shrink">Trend</th>
                    <th class="player-col">Player</th>
                    <th class="w-shrink">Total Points</th>
                </tr>
            </thead>
            <tbody id="seasonBody"></tbody>
        </table>
    </div>

    <h3 style="background:#263238; color:white;">📜 Tournament History</h3>
    <div id="historyContainer"></div>
</div>

<script>
    async function fetchData() {
        try {
            const response = await fetch('./data.json?v=' + new Date().getTime());
            if (!response.ok) throw new Error('data.json not found');
            const data = await response.json();
            renderLeaderboard(data);
        } catch (err) {
            document.getElementById('liveBody').innerHTML = `<tr><td colspan="9" style="padding:40px;">Check back soon for tournament updates.</td></tr>`;
        }
    }

    function getPlatformIcon(platform) {
        const p = (platform || "").toLowerCase();
        if (p.includes('ps')) return '<i class="fa-brands fa-playstation"></i>';
        if (p.includes('xb')) return '<i class="fa-brands fa-xbox"></i>';
        if (p.includes('pc') || p.includes('steam')) return '<i class="fa-brands fa-steam"></i>';
        return '<i class="fa-solid fa-gamepad"></i>';
    }

    function renderLeaderboard(data) {
        document.getElementById('venueName').innerText = `⛳ ${data.venue || 'Tournament'}`;
        document.getElementById('sigStatus').innerHTML = data.isSig ? '<span class="sig-tag">SIGNATURE EVENT</span>' : '';

        const lBody = document.getElementById('liveBody');
        lBody.innerHTML = '';
        const parPerRound = parseInt(data.par) || 72;
        
        let processedPlayers = data.players.map(p => {
            const scores = [parseInt(p.r1)||0, parseInt(p.r2)||0, parseInt(p.r3)||0, parseInt(p.r4)||0];
            const activeRounds = scores.filter(s => s > 0).length;
            const total = scores.reduce((a,b) => a+b, 0);
            const toPar = activeRounds > 0 ? total - (activeRounds * parPerRound) : 9999;
            return { ...p, total, toPar, activeRounds };
        });

        processedPlayers.sort((a,b) => a.toPar - b.toPar);

        processedPlayers.forEach((p, i) => {
            if (p.activeRounds === 0) return;
            let trueRank = i + 1;
            for(let j=0; j<i; j++) { if(processedPlayers[j].toPar === p.toPar) { trueRank = j+1; break; } }
            const isTie = (processedPlayers[i-1]?.toPar === p.toPar) || (processedPlayers[i+1]?.toPar === p.toPar);
            const toParDisplay = p.toPar === 0 ? "E" : (p.toPar > 0 ? `+${p.toPar}` : p.toPar);

            lBody.innerHTML += `
                <tr>
                    <td class="w-shrink" style="font-weight:bold; color:#888;">${isTie ? 'T'+trueRank : trueRank}</td>
                    <td class="player-col" style="font-weight:600;">${getPlatformIcon(p.console)} ${p.name}</td>
                    <td class="to-par-cell ${p.toPar < 0 ? 'under-par' : ''}">${toParDisplay}</td>
                    <td class="w-shrink">${p.r1 || '-'}</td><td class="w-shrink">${p.r2 || '-'}</td><td class="w-shrink">${p.r3 || '-'}</td><td class="w-shrink">${p.r4 || '-'}</td>
                    <td class="w-shrink" style="background:#fcfcfc; font-weight:bold;">${p.total}</td>
                    <td class="w-shrink" style="color:var(--golf-green); font-weight:bold;">${calculatePts(trueRank, data.isSig)}</td>
                </tr>`;
        });

        const sBody = document.getElementById('seasonBody');
        sBody.innerHTML = '';
        const sortedSeason = Object.entries(data.season).sort((a,b) => b[1].points - a[1].points);
        
        sortedSeason.forEach((item, index) => {
            const rank = index + 1;
            const p = item[1];
            let trend = '<span style="color:#999">—</span>';
            if (p.lastRank) {
                if (rank < p.lastRank) trend = '<span style="color:var(--golf-green)">▲</span>';
                else if (rank > p.lastRank) trend = '<span style="color:var(--under-red)">▼</span>';
            }
            sBody.innerHTML += `
                <tr>
                    <td class="w-shrink" style="font-weight:bold;">${rank}</td>
                    <td class="w-shrink">${trend}</td>
                    <td class="player-col" style="font-weight:600;">${getPlatformIcon(p.console)} ${item[0]}</td>
                    <td class="w-shrink" style="font-weight:bold; color:var(--golf-green);">${p.points.toLocaleString()}</td>
                </tr>`;
        });

        // HISTORY PROCESSING
        const histCont = document.getElementById('historyContainer');
        histCont.innerHTML = data.history || '';
        
        // Final polish for History tables
        document.querySelectorAll('.history-content').forEach(content => {
            const table = content.querySelector('table');
            if (table) {
                // Apply player left alignment and column shrinking
                table.querySelectorAll('tr').forEach(row => {
                    const cells = row.querySelectorAll('td, th');
                    if (cells.length > 1) {
                        cells[1].classList.add('player-col'); // Player col
                        cells[0].classList.add('w-shrink');   // Pos col
                    }
                });

                // Swap Total and To Par columns in History
                // Assuming History structure matches the old leaderboard (Pos, Player, R1-R4, Total, To Par)
                // We want: Pos, Player, To Par, R1, R2, R3, R4, Total
                table.querySelectorAll('tr').forEach(row => {
                    const cells = Array.from(row.cells);
                    if (cells.length >= 8) {
                        const toParCell = cells[7]; // Originally last
                        const totalCell = cells[6]; // Originally second to last
                        const playerCell = cells[1];
                        // Move To Par after Player
                        playerCell.parentNode.insertBefore(toParCell, playerCell.nextSibling);
                    }
                });

                // Wrap in scroller
                if (content.className !== 'scroller') {
                    const wrap = document.createElement('div');
                    wrap.className = 'scroller';
                    table.parentNode.insertBefore(wrap, table);
                    wrap.appendChild(table);
                }
            }
        });
    }

    function calculatePts(rank, isSig) {
        let pts = rank === 1 ? 250 : rank === 2 ? 200 : rank === 3 ? 150 : rank === 4 ? 100 : Math.max(0, 100 - ((rank - 4) * 10));
        return isSig ? pts * 2 : pts;
    }

    function toggleHistory(h) {
        const c = h.nextElementSibling;
        c.style.display = (c.style.display === 'block') ? 'none' : 'block';
    }

    window.onload = fetchData;
</script>

</body>
</html>
